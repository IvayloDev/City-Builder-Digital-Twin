                            cluster.push(other);
                            processed.add(j);
                        }
                    }
                    
                    // Merge cluster into single obstacle
                    if(cluster.length === 1) {
                        mergedObstacles.push(current);
                    } else {
                        // Calculate weighted center and combined radius
                        let totalX = 0, totalY = 0, maxRadius = 0;
                        cluster.forEach(obs => {
                            totalX += obs.x;
                            totalY += obs.y;
                            maxRadius = Math.max(maxRadius, obs.radius);
                        });
                        
                        mergedObstacles.push({
                            x: totalX / cluster.length,
                            y: totalY / cluster.length,
                            type: current.type,
                            radius: maxRadius * 1.2 // Use max radius with slight increase
                        });
                    }
                }
                
                obstacles.length = 0;
                obstacles.push(...mergedObstacles);

                const seedCount = Math.floor(3 + Math.random() * 6);
                let attempts = 0;
                while(nodes.length < seedCount && attempts < 100) {
                    attempts++;
                    const x = w * 0.1 + Math.random() * (w * 0.8);
                    const y = h * 0.1 + Math.random() * (h * 0.8);
                    
                    // Don't place nodes on obstacles
                    let onObstacle = false;
                    for(let obs of obstacles) {
                        if(Math.hypot(obs.x - x, obs.y - y) < obs.radius + 80) {
                            onObstacle = true;
                            break;
                        }
                    }
                    if(onObstacle) continue;
                    
                    let ok = true;
                    for(let n of nodes) { if(Math.hypot(n.x-x, n.y-y) < 220) ok=false; }
                    if(ok) nodes.push({x, y});
                }

                const names = ["Sector 1", "District 9", "Core", "Uptown", "Port", "Nexus", "Alpha", "Omega"];
                nodes.forEach((n, i) => {
                    const pop = Math.floor(20000 + Math.random() * 230000);
                    neighborhoods.push({
                        name: names[i] || "Zone "+i,
                        x: n.x, y: n.y,
                        pop: pop, 
                        stats: { env: 15, eco: 15, saf: 15, cul: 15, acc: 0 } 
                    });
                });

                for(let i=0; i<nodes.length; i++) {
                    let dists = nodes.map((n, idx) => ({idx, d: Math.hypot(n.x-nodes[i].x, n.y-nodes[i].y)}));
                    dists.sort((a,b) => a.d - b.d);
                    for(let k=1; k<Math.min(4, dists.length); k++) {
                        const targetIdx = dists[k].idx;
                        if(targetIdx > i) {
                            const n1 = nodes[i];
                            const n2 = nodes[targetIdx];
                            
                            // Check if direct path hits obstacles - if so, create waypoint path
                            // Use local obstacles array since map isn't set yet
                            let hitsObstacle = false;
                            if(obstacles && obstacles.length > 0) {
                                for(let obs of obstacles) {
                                    const dist = this.distToSegment(obs.x, obs.y, n1.x, n1.y, n2.x, n2.y);
                                    if(dist < obs.radius + 10) {
                                        hitsObstacle = true;
                                        break;
                                    }
                                }
                            }
                            
                            if(hitsObstacle) {
                                // Store waypoint path for this connection
                                const waypoints = this.findPathAroundObstaclesWithList(n1.x, n1.y, n2.x, n2.y, obstacles);
                                if(waypoints && waypoints.length > 2) {
                                    lines.push({
                                        from: i,
                                        to: targetIdx,
                                        waypoints: waypoints.slice(1, -1) // Exclude start and end points
                                    });
                                } else {
                                    // If pathfinding fails, skip this connection
                                    // lines.push([i, targetIdx]); // Skip instead of direct line
                                }
                            } else {
                                // Direct path is clear
                                lines.push([i, targetIdx]);
                            }
                        }
                    }
                }

                // Ensure all nodes are connected
                this.ensureAllNodesConnected(nodes, lines, obstacles);

                this.map = { nodes, lines, neighborhoods, obstacles };
                this.recalc();
            },

            // Check if all nodes are connected (graph connectivity)
            areAllNodesConnected(nodes, lines) {
                if(nodes.length === 0) return true;
                if(nodes.length === 1) return true;
                
                // Build adjacency list
                const adj = new Array(nodes.length).fill(0).map(() => []);
                lines.forEach(l => {
                    let from, to;
                    if(Array.isArray(l)) {
                        from = l[0];
                        to = l[1];
                    } else {
                        from = l.from;
                        to = l.to;
                    }
                    adj[from].push(to);
                    adj[to].push(from);
                });
                
                // BFS from first node to check if all nodes are reachable
                const visited = new Set();
                const queue = [0];
                visited.add(0);
                
                while(queue.length > 0) {
                    const current = queue.shift();
                    for(const neighbor of adj[current]) {
                        if(!visited.has(neighbor)) {
                            visited.add(neighbor);
                            queue.push(neighbor);
                        }
                    }
                }
                
                return visited.size === nodes.length;
            },

            // Ensure all nodes are connected by adding additional connections if needed
            ensureAllNodesConnected(nodes, lines, obstacles) {
                if(nodes.length <= 1) return;
                
                // Check connectivity
                if(this.areAllNodesConnected(nodes, lines)) {
                    return; // Already connected
                }
                
                // Build adjacency list to find disconnected components
                const adj = new Array(nodes.length).fill(0).map(() => []);
                lines.forEach(l => {
                    let from, to;
                    if(Array.isArray(l)) {
                        from = l[0];
                        to = l[1];
                    } else {
                        from = l.from;
                        to = l.to;
                    }
                    adj[from].push(to);
                    adj[to].push(from);
                });
                
                // Find all connected components
                const visited = new Set();
                const components = [];
                
                for(let i = 0; i < nodes.length; i++) {
                    if(visited.has(i)) continue;
                    
                    const component = [];
                    const queue = [i];
                    visited.add(i);
                    component.push(i);
                    
                    while(queue.length > 0) {
                        const current = queue.shift();
                        for(const neighbor of adj[current]) {
                            if(!visited.has(neighbor)) {
                                visited.add(neighbor);
                                component.push(neighbor);
                                queue.push(neighbor);
                            }
                        }
                    }
                    
                    components.push(component);
                }
                
                // Connect components by finding shortest paths between them
                for(let c = 1; c < components.length; c++) {
                    const comp1 = components[0]; // Connect everything to first component
                    const comp2 = components[c];
                    
                    // Find closest pair of nodes between components
                    let minDist = Infinity;
                    let bestFrom = -1;
                    let bestTo = -1;
                    
                    for(const i of comp1) {
                        for(const j of comp2) {
                            const dist = Math.hypot(nodes[i].x - nodes[j].x, nodes[i].y - nodes[j].y);
                            if(dist < minDist) {
                                minDist = dist;
                                bestFrom = i;
                                bestTo = j;
                            }
                        }
                    }
                    
                    // Add connection between closest nodes
                    if(bestFrom >= 0 && bestTo >= 0) {
                        const n1 = nodes[bestFrom];
                        const n2 = nodes[bestTo];
                        
                        // Check if path hits obstacles
                        let hitsObstacle = false;
                        if(obstacles && obstacles.length > 0) {
                            for(let obs of obstacles) {
                                const dist = this.distToSegment(obs.x, obs.y, n1.x, n1.y, n2.x, n2.y);
                                if(dist < obs.radius + 10) {
                                    hitsObstacle = true;
                                    break;
                                }
                            }
                        }
                        
                        if(hitsObstacle) {
                            // Try to find waypoint path
                            const waypoints = this.findPathAroundObstaclesWithList(n1.x, n1.y, n2.x, n2.y, obstacles);
                            if(waypoints && waypoints.length > 2) {
                                lines.push({
                                    from: bestFrom,
                                    to: bestTo,
                                    waypoints: waypoints.slice(1, -1)
                                });
                            } else {
                                // If pathfinding fails, add direct connection anyway (will intersect obstacle but ensures connectivity)
                                lines.push([bestFrom, bestTo]);
                            }
                        } else {
                            // Direct path is clear
                            lines.push([bestFrom, bestTo]);
                        }
                    }
                }
                
                // Verify all nodes are now connected
                if(!this.areAllNodesConnected(nodes, lines)) {
                    // If still not connected, add a minimum spanning tree
                    this.addMinimumSpanningTree(nodes, lines, obstacles);
                }
            },

            // Add minimum spanning tree to ensure connectivity (fallback)
            addMinimumSpanningTree(nodes, lines, obstacles) {
                // Use Prim's algorithm to create MST
                const inTree = new Set();
                const distances = new Array(nodes.length).fill(Infinity);
                const parents = new Array(nodes.length).fill(-1);
                
                distances[0] = 0;
                
                for(let i = 0; i < nodes.length; i++) {
                    // Find node with minimum distance not in tree
                    let minDist = Infinity;
                    let minNode = -1;
                    
                    for(let j = 0; j < nodes.length; j++) {
                        if(!inTree.has(j) && distances[j] < minDist) {
                            minDist = distances[j];
                            minNode = j;
                        }
                    }
                    
                    if(minNode === -1) break;
                    inTree.add(minNode);
                    
                    // Add edge to tree if it has a parent
                    if(parents[minNode] >= 0) {
                        const from = parents[minNode];
                        const to = minNode;
                        
                        // Check if this connection already exists
                        let exists = false;
                        for(const l of lines) {
                            let lFrom, lTo;
                            if(Array.isArray(l)) {
                                lFrom = l[0];
                                lTo = l[1];
                            } else {
                                lFrom = l.from;
                                lTo = l.to;
                            }
                            if((lFrom === from && lTo === to) || (lFrom === to && lTo === from)) {
                                exists = true;
                                break;
                            }
                        }
                        
                        if(!exists) {
                            const n1 = nodes[from];
                            const n2 = nodes[to];
                            
                            // Check obstacles
                            let hitsObstacle = false;
                            if(obstacles && obstacles.length > 0) {
                                for(let obs of obstacles) {
                                    const dist = this.distToSegment(obs.x, obs.y, n1.x, n1.y, n2.x, n2.y);
                                    if(dist < obs.radius + 10) {
                                        hitsObstacle = true;
                                        break;
                                    }
                                }
                            }
                            
                            if(hitsObstacle) {
                                const waypoints = this.findPathAroundObstaclesWithList(n1.x, n1.y, n2.x, n2.y, obstacles);
                                if(waypoints && waypoints.length > 2) {
                                    lines.push({
                                        from: from,
                                        to: to,
                                        waypoints: waypoints.slice(1, -1)
                                    });
                                } else {
                                    lines.push([from, to]);
                                }
                            } else {
                                lines.push([from, to]);
                            }
                        }
                    }
                    
                    // Update distances to neighbors
                    for(let j = 0; j < nodes.length; j++) {
                        if(!inTree.has(j)) {
                            const dist = Math.hypot(nodes[minNode].x - nodes[j].x, nodes[minNode].y - nodes[j].y);
                            if(dist < distances[j]) {
                                distances[j] = dist;
                                parents[j] = minNode;
                            }
                        }
                    }
                }
            },

            // --- GAMEPLAY INTERACTION ---
            getPointer(e) {
                const r = this.canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: clientX - r.left, y: clientY - r.top };
            },

            checkCollision(x, y) {
                // Check other buildings
                for(let p of this.placements) {
                    if(Math.hypot(p.x - x, p.y - y) < 50) return true;
                }
                // Check hubs
                for(let n of this.map.nodes) {
                    if(Math.hypot(n.x - x, n.y - y) < 60) return true;
                }
                // Note: Obstacles are NOT checked here - buildings can be placed on obstacles (they'll be inactive)
                return false;
            },
            
            checkObstacle(x, y) {
                // Check if position is on an obstacle
                if(this.map.obstacles) {
                    for(let obs of this.map.obstacles) {
                        if(Math.hypot(obs.x - x, obs.y - y) < obs.radius) {
                            return obs.type; // Return obstacle type ('water' or 'mountain')
                        }
                    }
                }
                return null;
            },

            handlePress(e) {
                const p = this.getPointer(e);
                for (let i = this.placements.length - 1; i >= 0; i--) {
                    const placement = this.placements[i];
                    if (Math.hypot(p.x - placement.x, p.y - placement.y) < 25) {
                        const b = BUILDINGS.find(x => x.id === placement.typeId);
                        this.budget += b.cost;
                        this.placements.splice(i, 1);
                        this.draggingId = b.id;
                        
                        const dragDiv = document.getElementById('drag-preview');
                        const inner = document.getElementById('drag-icon-inner');
                        inner.style.borderColor = b.color;
                        inner.style.color = b.color;
                        inner.innerHTML = `<svg class="icon-svg" viewBox="0 0 24 24"><path d="${ICONS[b.iconKey]}"></path></svg>`;
                        dragDiv.style.display = 'block';
                        
                        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                        dragDiv.style.left = clientX + 'px';
                        dragDiv.style.top = clientY + 'px';

                        this.recalc();
                        this.updateUI();
                        return; 
                    }
                }
            },

            handleMove(e) {
                TipSystem.registerInteraction();
                const p = this.getPointer(e);
                this.mouseX = p.x;
                this.mouseY = p.y;
                if(this.draggingId) {
                    const dragDiv = document.getElementById('drag-preview');
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                    dragDiv.style.left = clientX + 'px';
                    dragDiv.style.top = clientY + 'px';

                    this.isValidPlacement = !this.checkCollision(this.mouseX, this.mouseY);
                    if(this.isValidPlacement) {
                        dragDiv.style.opacity = "1";
                        document.body.style.cursor = "grabbing";
                        
                        // Preview stats with temporary placement
                        this.previewStats(this.draggingId, this.mouseX, this.mouseY);
                    } else {
                        dragDiv.style.opacity = "0.5";
                        document.body.style.cursor = "not-allowed";
                    }
                }
            },
            
            previewStats(typeId, x, y) {
                // Temporarily add placement for preview
                const b = BUILDINGS.find(x => x.id === typeId);
                
                // Check if building would be inactive (on obstacle)
                const obstacleType = this.checkObstacle(x, y);
                const inactive = obstacleType !== null;
                
                // Only check connectivity if not inactive
                const conns = inactive ? [] : this.getConnectivity(x, y);
                const connected = inactive ? false : (conns.length > 0);
                
                const tempPlacement = {
                    typeId, x, y,
                    connections: conns,
                    connected,
                    efficiency: inactive ? 0 : (connected ? 1.0 : 0.2),
                    inactive: inactive,
                    isPreview: true
                };
                
                // Save current placements
                const savedPlacements = [...this.placements];
                // Add preview placement
                this.placements.push(tempPlacement);
                
                // Recalculate with preview
                this.recalc();
                this.updateUI();
                
                // Restore placements
                this.placements = savedPlacements;
                // Recalculate without preview
                this.recalc();
            },
            
            previewStats(typeId, x, y) {
                // Temporarily add placement for preview
                const b = BUILDINGS.find(x => x.id === typeId);
                const conns = this.getConnectivity(x, y);
                const connected = conns.length > 0;
                
                const tempPlacement = {
                    typeId, x, y,
                    connections: conns,
                    connected,
                    efficiency: connected ? 1.0 : 0.2,
                    isPreview: true
                };
                
                // Save current placements
                const savedPlacements = [...this.placements];
                // Add preview placement
                this.placements.push(tempPlacement);
                
                // Recalculate with preview
                this.recalc();
                this.updateUI();
                
                // Restore placements
                this.placements = savedPlacements;
                // Recalculate without preview
                this.recalc();
            },

            handleRelease(e) {
                if(this.draggingId) {
                    const p = this.getPointer(e);
                    if(p.x > 0 && p.x < this.width && p.y > 0 && p.y < this.height) {
                        if(!this.checkCollision(p.x, p.y)) {
                            // Can place - check if on obstacle (will be inactive)
                            this.placeBuilding(this.draggingId, p.x, p.y);
                        } else {
                            // Collision with other buildings or hubs - cannot place
                            this.showToast("Space Occupied", "bad");
                            // Refund logic handled below implicitly by not deducting
                        }
                    } else {
                        // Dropped outside, no deduction needed
                    }
                    this.draggingId = null;
                    document.getElementById('drag-preview').style.display = 'none';
                    document.body.style.cursor = "default";
                }
            },

            renderPalette() {
                const p = document.getElementById('palette');
                p.innerHTML = '';
                BUILDINGS.forEach(b => {
                    const el = document.createElement('div');
                    el.className = `building-card ${b.size}`;
                    el.dataset.id = b.id;
                    el.innerHTML = `
                        <div class="bc-icon" style="color:${b.color}"><svg class="icon-svg" viewBox="0 0 24 24"><path d="${ICONS[b.iconKey]}"></path></svg></div>
                        <div class="bc-name">${b.name}</div>
                        <div class="bc-cost">₸${b.cost}</div>
                        <div class="bc-color-strip" style="background:${b.color}"></div>
                        <div class="bc-size-badge" style="color:${b.color}">${b.size === 'large' ? 'L' : 'S'}</div>
                    `;
                    el.onmousedown = (e) => {
                        e.preventDefault();
                        TipSystem.registerInteraction();
                        if(this.budget < b.cost) {
                            this.showToast("Insufficient Funds", "bad");
                            TipSystem.showBudgetTip(this);
                            return;
                        }
                        this.draggingId = b.id;
                        const dragDiv = document.getElementById('drag-preview');
                        const inner = document.getElementById('drag-icon-inner');
                        inner.style.borderColor = b.color;
                        inner.style.color = b.color;
                        inner.innerHTML = `<svg class="icon-svg" viewBox="0 0 24 24"><path d="${ICONS[b.iconKey]}"></path></svg>`;
                        dragDiv.style.display = 'block';
                        dragDiv.style.left = e.clientX + 'px';
                        dragDiv.style.top = e.clientY + 'px';
                    };
                    p.appendChild(el);
                });
            },

            renderMetricsBar() {
                const c = document.getElementById('metrics-bar');
                c.innerHTML = STATS.map(s => `
                    <div class="metric-group">
                        <div class="metric-header">
                            <span>${s.name}</span>
                            <span id="txt-${s.id}" style="color:${s.color}">50</span>
                        </div>
                        <div class="metric-track">
                            <div id="bar-${s.id}" class="metric-fill" style="background:${s.color}; width: 50%;"></div>
                        </div>
                    </div>
                `).join('');
            },

            distToSegment(px, py, x1, y1, x2, y2) {
                const l2 = (x1-x2)**2 + (y1-y2)**2;
                if (l2 === 0) return Math.hypot(px-x1, py-y1);
                let t = ((px-x1)*(x2-x1) + (py-y1)*(y2-y1)) / l2;
                t = Math.max(0, Math.min(1, t));
                return Math.hypot(px - (x1 + t*(x2-x1)), py - (y1 + t*(y2-y1)));
            },

            lineIntersectsObstacle(x1, y1, x2, y2) {
                if(!this.map.obstacles) return false;
                
                // Check if line segment intersects any obstacle
                for(let obs of this.map.obstacles) {
                    // Calculate distance from obstacle center to line segment
                    const dist = this.distToSegment(obs.x, obs.y, x1, y1, x2, y2);
                    
                    // If distance is less than obstacle radius, line intersects obstacle
                    if(dist < obs.radius + 10) { // Add small buffer
                        return true;
                    }
                }
                return false;
            },

            findPathAroundObstacles(x1, y1, x2, y2) {
                // Use map obstacles if available
                const obstacles = this.map?.obstacles || [];
                return this.findPathAroundObstaclesWithList(x1, y1, x2, y2, obstacles);
            },

            findPathAroundObstaclesWithList(x1, y1, x2, y2, obstacles) {
                // Try to find a path that avoids obstacles
                // Use a simple waypoint approach: if direct path hits obstacle, try going around
                
                if(!obstacles || obstacles.length === 0) {
                    return [{x: x1, y: y1}, {x: x2, y: y2}];
                }
                
                // Check if direct path hits obstacles
                let hitsObstacle = false;
                for(let obs of obstacles) {
                    const dist = this.distToSegment(obs.x, obs.y, x1, y1, x2, y2);
                    if(dist < obs.radius + 10) {
                        hitsObstacle = true;
                        break;
                    }
                }
                
                if(!hitsObstacle) {
                    return [{x: x1, y: y1}, {x: x2, y: y2}];
                }
                
                // Find obstacles blocking the path
                const blockingObstacles = [];
                for(let obs of obstacles) {
                    const dist = this.distToSegment(obs.x, obs.y, x1, y1, x2, y2);
                    if(dist < obs.radius + 10) {
                        blockingObstacles.push(obs);
                    }
                }
                
                if(blockingObstacles.length === 0) {
                    return [{x: x1, y: y1}, {x: x2, y: y2}];
                }
                
                // Try to route around obstacles
                // Find the closest obstacle to the midpoint
                const midX = (x1 + x2) / 2;
                const midY = (y1 + y2) / 2;
                blockingObstacles.sort((a, b) => {
                    const distA = Math.hypot(a.x - midX, a.y - midY);
                    const distB = Math.hypot(b.x - midX, b.y - midY);
                    return distA - distB;
                });
                
                const mainObstacle = blockingObstacles[0];
                
                // Calculate perpendicular direction to go around obstacle
                const dx = x2 - x1;
                const dy = y2 - y1;
                const len = Math.hypot(dx, dy);
                if(len === 0) return [{x: x1, y: y1}, {x: x2, y: y2}];
                
                const perpX = -dy / len;
                const perpY = dx / len;
                
                // Try going around on both sides
                const offset = mainObstacle.radius + 30;
                const waypoint1X = mainObstacle.x + perpX * offset;
                const waypoint1Y = mainObstacle.y + perpY * offset;
                const waypoint2X = mainObstacle.x - perpX * offset;
                const waypoint2Y = mainObstacle.y - perpY * offset;
                
                // Check which side is better (shorter and doesn't hit other obstacles)
                const path1 = [
                    {x: x1, y: y1},
                    {x: waypoint1X, y: waypoint1Y},
                    {x: x2, y: y2}
                ];
                const path2 = [
                    {x: x1, y: y1},
                    {x: waypoint2X, y: waypoint2Y},
                    {x: x2, y: y2}
                ];
                
                // Check if paths are valid (don't hit obstacles)
                let path1Valid = true;
                let path2Valid = true;
                
                for(let i = 0; i < path1.length - 1; i++) {
                    for(let obs of obstacles) {
                        const dist = this.distToSegment(obs.x, obs.y, path1[i].x, path1[i].y, path1[i+1].x, path1[i+1].y);
                        if(dist < obs.radius + 10) {
                            path1Valid = false;
                            break;
                        }
                    }
                    if(!path1Valid) break;
                }
                
                for(let i = 0; i < path2.length - 1; i++) {
                    for(let obs of obstacles) {
                        const dist = this.distToSegment(obs.x, obs.y, path2[i].x, path2[i].y, path2[i+1].x, path2[i+1].y);
                        if(dist < obs.radius + 10) {
                            path2Valid = false;
                            break;
                        }
                    }
                    if(!path2Valid) break;
                }
                
                if(path1Valid) return path1;
                if(path2Valid) return path2;
                
                // If both paths hit obstacles, return null to skip this connection
                return null;
            },

            getConnectivity(x, y) {
                const range = 200; 
                let connections = [];
                
                // Only check connections to roads (lines), NOT hubs
                this.map.lines.forEach(l => {
                    let points = [];
                    
                    // Handle both simple array format and waypoint format
                    if(Array.isArray(l)) {
                    const n1 = this.map.nodes[l[0]];
                    const n2 = this.map.nodes[l[1]];
                        points = [{x: n1.x, y: n1.y}, {x: n2.x, y: n2.y}];
                    } else {
                        const n1 = this.map.nodes[l.from];
                        const n2 = this.map.nodes[l.to];
                        points = [{x: n1.x, y: n1.y}];
                        if(l.waypoints) {
                            points.push(...l.waypoints);
                        }
                        points.push({x: n2.x, y: n2.y});
                    }
                    
                    // Check distance to each segment of the road
                    for(let i = 0; i < points.length - 1; i++) {
                        const p1 = points[i];
                        const p2 = points[i + 1];
                        const d = this.distToSegment(x, y, p1.x, p1.y, p2.x, p2.y);
                    if(d < range) {
                            const l2 = (p1.x-p2.x)**2 + (p1.y-p2.y)**2;
                            let t = ((x-p1.x)*(p2.x-p1.x) + (y-p1.y)*(p2.y-p1.y)) / l2;
                        t = Math.max(0, Math.min(1, t));
                            const cx = p1.x + t*(p2.x-p1.x);
                            const cy = p1.y + t*(p2.y-p1.y);
                        
                        let isDup = false;
                        for(let c of connections) if(Math.hypot(c.x-cx, c.y-cy) < 20) isDup = true;
                        
                        if(!isDup) connections.push({x: cx, y: cy, type:'line', dist: d});
                        }
                    }
                });

                return connections;
            },

            placeBuilding(typeId, x, y) {
                const b = BUILDINGS.find(x => x.id === typeId);
                // NOTE: Budget check for initial drag is done in onmousedown
                // Here we deduct because placement is final
                this.budget -= b.cost;
                
                // Check if building is on an obstacle
                const obstacleType = this.checkObstacle(x, y);
                const inactive = obstacleType !== null;
                
                // Check connectivity to roads only (not hubs) - but only if not inactive
                const conns = inactive ? [] : this.getConnectivity(x, y);
                const connected = conns.length > 0;

                const placement = {
                    typeId, x, y,
                    connections: conns,
                    connected: inactive ? false : connected,
                    efficiency: inactive ? 0 : (connected ? 1.0 : 0.2),
                    inactive: inactive
                };
                this.placements.push(placement);

                if(inactive) {
                    const obstacleName = obstacleType === 'water' ? 'Water' : 'Mountain';
                    this.showToast(`${b.name} Placed (Inactive on ${obstacleName})`, "bad");
                } else if(connected) {
                    this.showToast("Connected to Road", "good");
                } else {
                    this.showToast("Warning: Not Connected", "bad");
                }

                this.recalc();
                this.updateUI();
                
                // Notify tip system
                TipSystem.onPlacement(placement, typeId, this);
            },

            recalc() {
                // Guard: ensure map and neighborhoods exist
                if(!this.map || !this.map.neighborhoods || this.map.neighborhoods.length === 0) {
                    return;
                }
                
                // Reset stats to 0 (like Digital Twin 17) for immediate responsiveness
                this.map.neighborhoods.forEach(n => {
                    n.stats = { env: 0, eco: 0, saf: 0, cul: 0, acc: 0 }; 
                });

                // Calculate global connection bonus (like Digital Twin 17)
                const connectedBuildingCount = this.placements.filter(p => p.connected).length;
                const globalConnectionBonus = connectedBuildingCount === 0 ? 0 : Math.min(
                    15,
                    5 + Math.round(
                        ((Math.log2 ? Math.log2(connectedBuildingCount + 1) : Math.log(connectedBuildingCount + 1) / Math.log(2))) * 5
                    )
                );

                this.placements.forEach(p => {
                    const b = BUILDINGS.find(x => x.id === p.typeId);
                    if(!b) return;
                    
                    // Inactive buildings (on obstacles) have no effect
                    if(p.inactive) {
                        return; // No effect at all when inactive
                    }
                    
                    // Buildings ONLY affect stats when connected to the network
                    if(!p.connected) {
                        return; // No effect at all when not connected
                    }

                    // NEW: Connection radius system - affects all hubs proportionally by distance (like water flow)
                    const connectionRadius = b.connectionRadius || 500; // Default radius

                    this.map.neighborhoods.forEach(n => {
                        const dist = Math.hypot(p.x - n.x, p.y - n.y);
                        
                        // Only affect hubs within connection radius
                        if(dist > connectionRadius) {
                            return; // Beyond connection radius, no effect
                        }
                        
                        // Calculate influence based on distance (inverse square falloff for smooth water-flow effect)
                        // Influence decreases with distance - closer hubs get more effect
                        const normalizedDist = dist / connectionRadius; // 0 to 1
                        const influence = 1 - (normalizedDist * normalizedDist); // Inverse square falloff
                        
                        if(b.id === 'factory') {
                            // Factory has special donut pattern for visual range, but connection radius affects all hubs
                            const innerRadius = 70; 
                            if(dist < innerRadius) {
                                // Strong negative effects in inner radius
                                n.stats.eco -= 4 * influence; 
                                n.stats.env -= 4 * influence;
                                n.stats.saf -= 3 * influence;
                                n.stats.cul -= 3 * influence;
                            } else if (dist < b.range) {
                                // Positive eco in outer ring, slight env penalty
                                const donutThickness = b.range - innerRadius;
                                const position = dist - innerRadius;
                                const factoryPower = (position / donutThickness) * influence;
                                
                                n.stats.eco += 15 * factoryPower; 
                                n.stats.env -= 5 * factoryPower;
                            } else {
                                // Beyond visual range but within connection radius - still affects via connection
                                // Factory provides eco boost even at distance, but weaker
                                n.stats.eco += 8 * influence;
                                n.stats.env -= 2 * influence;
                            }
                        } else {
                            // Regular buildings: use effect value directly (already scaled to 5-12 range)
                            // Apply effect to all hubs within connection radius, weighted by distance
                            n.stats[b.stat] += b.effect * influence;
                            if(b.stat === 'eco') n.stats.env -= (b.effect * 0.3 * influence);
                            if(b.stat === 'env') n.stats.eco -= (b.effect * 0.3 * influence);
                        }
                    });
                });

                let count = this.map.neighborhoods.length || 1; // Prevent division by zero
                let globalScores = { env: 0, eco: 0, saf: 0, cul: 0, acc: 0 };
                
                this.map.neighborhoods.forEach(n => {
                    // Amplify stats with * 20 multiplier (like Digital Twin 17) - this makes small changes highly visible
                    const amplifiedStats = {
                        env: Math.max(0, Math.min(100, (n.stats.env || 0) * 20)),
                        eco: Math.max(0, Math.min(100, (n.stats.eco || 0) * 20)),
                        saf: Math.max(0, Math.min(100, (n.stats.saf || 0) * 20)),
                        cul: Math.max(0, Math.min(100, (n.stats.cul || 0) * 20)),
                        acc: 0 // Calculated separately
                    };
                    
                    // Calculate accessibility like Digital Twin 17
                    const zoneBuildings = this.placements.filter(p => {
                        const dist = Math.hypot(p.x - n.x, p.y - n.y);
                        return dist < 200; // Zone radius
                    });
                    const connectedNearHub = zoneBuildings.filter(p => p.connected);
                    const proximityRatio = zoneBuildings.length > 0 
                        ? connectedNearHub.length / zoneBuildings.length
                        : 0;
                    const proximityScore = Math.round(proximityRatio * 70);
                    const serviceBlend = Math.round((amplifiedStats.env + amplifiedStats.eco + amplifiedStats.saf + amplifiedStats.cul) / 4) || 0;
                    const serviceContribution = Math.round(serviceBlend * 0.3);
                    const baselineBoost = globalConnectionBonus;
                    
                    amplifiedStats.acc = Math.min(100, proximityScore + serviceContribution + baselineBoost);
                    
                    // Store amplified stats
                    n.stats = amplifiedStats;
                    
                    // Add to global totals
                    Object.keys(globalScores).forEach(k => {
                        globalScores[k] += amplifiedStats[k] || 0;
                    });
                    
                    // Calculate serviced status (access > 50)
                    n.serviced = amplifiedStats.acc > 50;
                    
                    // Queue hub nudges
                    const citizenTip = TipSystem.getHubNudge ? TipSystem.getHubNudge(n) : null;
                    if (citizenTip) {
                        TipSystem.queueHubNudge(citizenTip, n, this);
                    }
                });

                // Calculate average scores (like Digital Twin 17)
                const targetEnv = count > 0 ? Math.round(globalScores.env / count) : 0;
                const targetEco = count > 0 ? Math.round(globalScores.eco / count) : 0;
                const targetSaf = count > 0 ? Math.round(globalScores.saf / count) : 0;
                const targetCul = count > 0 ? Math.round(globalScores.cul / count) : 0;
                const targetAcc = count > 0 ? Math.round(globalScores.acc / count) : 0;
                
                // Interpolate smoothly (0.3 = 30% towards target per frame)
                const lerp = (current, target, factor = 0.3) => {
                    const curr = current || 0;
                    const targ = target || 0;
                    return curr + (targ - curr) * factor;
                };
                
                this.scores.env = Math.round(lerp(this.scores.env, targetEnv));
                this.scores.eco = Math.round(lerp(this.scores.eco, targetEco));
                this.scores.saf = Math.round(lerp(this.scores.saf, targetSaf));
                this.scores.cul = Math.round(lerp(this.scores.cul, targetCul));
                this.scores.acc = Math.round(lerp(this.scores.acc, targetAcc));

                const statValues = [this.scores.env, this.scores.eco, this.scores.saf, this.scores.cul, this.scores.acc];
                const sumStats = statValues.reduce((a, b) => (a || 0) + (b || 0), 0);
                const qolScore = statValues.length > 0 ? Math.floor(sumStats / statValues.length) : 50;

                const minStat = Math.min(...statValues.filter(v => v !== undefined && !isNaN(v)));
                const finalQol = (minStat < 20 && !isNaN(minStat)) ? qolScore * 0.9 : qolScore;

                this.scores.qol = Math.round(finalQol) || 50;
            },

            updateUI() {
                document.getElementById('ui-timer').innerText = this.formatTime(this.time);
                document.getElementById('ui-budget').innerText = this.budget;
                document.getElementById('ui-qol').innerText = this.scores.qol;
                document.getElementById('ui-acc').innerText = this.scores.acc + '%';

                STATS.forEach(s => {
                    const el = document.getElementById(`txt-${s.id}`);
                    const bar = document.getElementById(`bar-${s.id}`);
                    if (el) {
                        // Smooth number transition
                        const current = parseInt(el.innerText) || 0;
                        const target = this.scores[s.id];
                        if (Math.abs(current - target) > 0.5) {
                            const lerped = Math.round(current + (target - current) * 0.3);
                            el.innerText = lerped;
                        } else {
                            el.innerText = target;
                        }
                    }
                    if (bar) {
                        // Smooth bar transition with CSS
                        bar.style.transition = 'width 0.3s ease-out';
                        bar.style.width = this.scores[s.id] + '%';
                    }
                });

                document.querySelectorAll('.building-card').forEach(el => {
                    const id = el.dataset.id;
                    const b = BUILDINGS.find(x => x.id === id);
                    if(this.budget < b.cost) el.classList.add('disabled');
                    else el.classList.remove('disabled');
                });
            },

            formatTime(s) {
                const m = Math.floor(s/60);
                const sc = s%60;
                return `${m.toString().padStart(2,'0')}:${sc.toString().padStart(2,'0')}`;
            },

            showToast(msg, type) {
                const t = document.getElementById('feedback-toast');
                const i = document.getElementById('toast-icon');
                const m = document.getElementById('toast-msg');
                m.innerText = msg;
                i.innerText = type === 'good' ? '✓' : '!';
                i.style.color = type === 'good' ? '#00ff88' : '#ff0066';
                t.style.borderColor = type === 'good' ? '#00ff88' : '#ff0066';
                t.classList.add('visible');
                setTimeout(() => t.classList.remove('visible'), 2000);
            },

            // --- RENDER LOOP ---
            loop() {
                this.animTime += 0.01;
                const ctx = this.ctx;
                ctx.fillStyle = '#000000';
                ctx.fillRect(0, 0, this.width, this.height);

                this.drawObstacles();
                this.drawConnections();
                this.drawNodes();
                this.drawPlacements();
                this.drawDragPreview();

                requestAnimationFrame(() => this.loop());
            },

            drawObstacles() {
                if(!this.map.obstacles) return;
                
                const ctx = this.ctx;
                
                // Helper function to draw diamond (square rotated 45 degrees)
                const drawDiamond = (x, y, size) => {
                ctx.beginPath();
                    ctx.moveTo(x, y - size); // Top
                    ctx.lineTo(x + size, y); // Right
                    ctx.lineTo(x, y + size); // Bottom
                    ctx.lineTo(x - size, y); // Left
                    ctx.closePath();
                };
                
                // Draw water obstacles as diamonds
                const waterObstacles = this.map.obstacles.filter(o => o.type === 'water');
                if(waterObstacles.length > 0) {
                    ctx.save();
                    waterObstacles.forEach(obs => {
                        const size = obs.radius;
                        
                        // Outer fill - reduced brightness to match background
                        drawDiamond(obs.x, obs.y, size);
                        ctx.fillStyle = 'rgba(0, 80, 120, 0.65)';
                        ctx.shadowColor = 'rgba(0, 80, 120, 0.5)';
                        ctx.shadowBlur = 15;
                        ctx.fill();
                        
                        // Inner highlight - darker to match background
                        drawDiamond(obs.x, obs.y, size * 0.7);
                        ctx.fillStyle = 'rgba(40, 100, 140, 0.25)';
                        ctx.fill();
                        
                        // Border - reduced brightness
                        drawDiamond(obs.x, obs.y, size);
                        ctx.strokeStyle = 'rgba(0, 120, 180, 0.7)';
                        ctx.lineWidth = 3;
                        ctx.stroke();
                    });
                    ctx.shadowBlur = 0;
                    ctx.restore();
                }
                
                // Draw mountain obstacles as diamonds
                const mountainObstacles = this.map.obstacles.filter(o => o.type === 'mountain');
                if(mountainObstacles.length > 0) {
                    ctx.save();
                    mountainObstacles.forEach(obs => {
                        const size = obs.radius;
                        
                        // Outer fill - reduced brightness to match background
                        drawDiamond(obs.x, obs.y, size);
                        ctx.fillStyle = 'rgba(50, 55, 60, 0.55)';
                        ctx.shadowColor = 'rgba(50, 55, 60, 0.4)';
                        ctx.shadowBlur = 15;
                        ctx.fill();
                        
                        // Inner shadow - darker to match background
                        drawDiamond(obs.x, obs.y, size * 0.7);
                        ctx.fillStyle = 'rgba(35, 40, 45, 0.35)';
                        ctx.fill();
                        
                        // Border - reduced brightness
                        drawDiamond(obs.x, obs.y, size);
                        ctx.strokeStyle = 'rgba(65, 70, 75, 0.6)';
                        ctx.lineWidth = 3;
                        ctx.stroke();
                    });
                    ctx.shadowBlur = 0;
                    ctx.restore();
                }
            },

            drawConnections() {
                if(!this.map || !this.map.lines) return;
                const ctx = this.ctx;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                
                // Draw background layer for all roads - Neutral high-tech gray-blue (matching Digital Twin 17)
                ctx.save();
                ctx.strokeStyle = '#7c8ca0';
                ctx.globalAlpha = 0.25;
                ctx.lineWidth = 7;
                
                this.map.lines.forEach(l => {
                    ctx.beginPath();
                    
                    // Handle both simple array format [from, to] and waypoint format {from, to, waypoints}
                    if(Array.isArray(l)) {
                        // Simple direct line
                    const n1 = this.map.nodes[l[0]];
                    const n2 = this.map.nodes[l[1]];
                    ctx.moveTo(n1.x, n1.y);
                    ctx.lineTo(n2.x, n2.y);
                    } else {
                        // Waypoint path (obstacle avoidance)
                        const n1 = this.map.nodes[l.from];
                        const n2 = this.map.nodes[l.to];
                        ctx.moveTo(n1.x, n1.y);
                        
                        // Draw through waypoints if they exist
                        if(l.waypoints && l.waypoints.length > 0) {
                            l.waypoints.forEach(wp => {
                                ctx.lineTo(wp.x, wp.y);
                            });
                        }
                        
                        ctx.lineTo(n2.x, n2.y);
                    }
                ctx.stroke();
                });
                ctx.restore();

                // Draw foreground (dashed) - matching Digital Twin 17
                ctx.save();
                ctx.strokeStyle = '#7c8ca0';
                ctx.lineWidth = 3;
                ctx.globalAlpha = 0.5;
                ctx.setLineDash([10, 8]);
                ctx.lineDashOffset = -this.animTime * 30; 
                
                this.map.lines.forEach(l => {
                    ctx.beginPath();
                    
                    if(Array.isArray(l)) {
                        const n1 = this.map.nodes[l[0]];
                        const n2 = this.map.nodes[l[1]];
                        ctx.moveTo(n1.x, n1.y);
                        ctx.lineTo(n2.x, n2.y);
                    } else {
                        const n1 = this.map.nodes[l.from];
                        const n2 = this.map.nodes[l.to];
                        ctx.moveTo(n1.x, n1.y);
                        
                        if(l.waypoints && l.waypoints.length > 0) {
                            l.waypoints.forEach(wp => {
                                ctx.lineTo(wp.x, wp.y);
                            });
                        }
                        
                        ctx.lineTo(n2.x, n2.y);
                    }
                ctx.stroke();
                });
                
                ctx.setLineDash([]);
                ctx.globalAlpha = 1.0;
                ctx.restore();
                
                // === Animated dots on roads (like Digital Twin 17) ===
                const animationTime = performance.now() * 0.001;
                const dotSpeed = 50; // Pixels per second
                const dotSpacing = 60; // Distance between dots
                const dotSize = 3;
                
                ctx.save();
                ctx.fillStyle = '#a8b8d0'; // Light gray-blue to match neutral road theme
                ctx.globalAlpha = 0.8;
                
                this.map.lines.forEach(l => {
                    // Build path points array
                    let pathPoints = [];
                    
                    if(Array.isArray(l)) {
                        // Simple direct line
                        const n1 = this.map.nodes[l[0]];
                        const n2 = this.map.nodes[l[1]];
                        pathPoints = [{x: n1.x, y: n1.y}, {x: n2.x, y: n2.y}];
                    } else {
                        // Waypoint path
                        const n1 = this.map.nodes[l.from];
                        const n2 = this.map.nodes[l.to];
                        pathPoints = [{x: n1.x, y: n1.y}];
                        
                        if(l.waypoints && l.waypoints.length > 0) {
                            l.waypoints.forEach(wp => {
                                pathPoints.push({x: wp.x, y: wp.y});
                            });
                        }
                        
                        pathPoints.push({x: n2.x, y: n2.y});
                    }
                    
                    if(pathPoints.length < 2) return;
                    
                    // Calculate total path length
                    let totalLength = 0;
                    const segmentLengths = [];
                    for (let i = 0; i < pathPoints.length - 1; i++) {
                        const p1 = pathPoints[i];
                        const p2 = pathPoints[i + 1];
                        const segLen = Math.hypot(p2.x - p1.x, p2.y - p1.y);
                        segmentLengths.push(segLen);
                        totalLength += segLen;
                    }
                    
                    if (totalLength === 0) return;
                    
                    // Draw multiple dots along the path
                    const numDots = Math.ceil(totalLength / dotSpacing) + 1;
                    for (let dotIdx = 0; dotIdx < numDots; dotIdx++) {
                        // Calculate position along path with animation offset
                        const basePosition = dotIdx * dotSpacing;
                        const animOffset = (animationTime * dotSpeed) % (totalLength + dotSpacing);
                        const position = (basePosition - animOffset + totalLength + dotSpacing) % (totalLength + dotSpacing);
                        
                        if (position < 0 || position > totalLength) continue;
                        
                        // Find which segment this position is on
                        let currentLength = 0;
                        let segmentIdx = 0;
                        for (let i = 0; i < segmentLengths.length; i++) {
                            if (currentLength + segmentLengths[i] >= position) {
                                segmentIdx = i;
                                break;
                            }
                            currentLength += segmentLengths[i];
                        }
                        
                        // Calculate position on segment
                        const segStart = pathPoints[segmentIdx];
                        const segEnd = pathPoints[segmentIdx + 1];
                        const segT = segmentLengths[segmentIdx] > 0 
                            ? (position - currentLength) / segmentLengths[segmentIdx]
                            : 0;
                        const dotX = segStart.x + (segEnd.x - segStart.x) * segT;
                        const dotY = segStart.y + (segEnd.y - segStart.y) * segT;
                        
                        // Draw the dot
                        ctx.beginPath();
                        ctx.arc(dotX, dotY, dotSize, 0, Math.PI * 2);
                        ctx.fill();
                    }
                });
                
                ctx.restore();
            },

            drawNodes() {
                if(!this.map || !this.map.neighborhoods) return;
                const ctx = this.ctx;

                this.map.neighborhoods.forEach(n => {
                    const minR = 25;
                    const maxR = 65;
                    const r = minR + ((n.pop - 20000) / (230000)) * (maxR - minR);
                    
                    // UPDATED: Only 4 stats on the visual ring (90 degrees each)
                    // Accessibility is still calculated globally but not shown on the hub ring to reduce clutter
                    const stats = ['env', 'eco', 'saf', 'cul'];
                    const maxAngle = (Math.PI * 2) / 4; // 90 degrees
                    
                    // 1. Draw Hub Body (Dark with glow)
                    ctx.beginPath();
                    ctx.arc(n.x, n.y, r - 5, 0, Math.PI*2);
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                    ctx.shadowColor = 'rgba(0, 255, 255, 0.3)';
                    ctx.shadowBlur = 15;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = 'rgba(0, 255, 255, 0.4)';
                    ctx.lineWidth = 4;
                    ctx.stroke();

                    // 2. Draw Stats as Radial Bars around the hub
                    stats.forEach((key, i) => {
                        const rawVal = n.stats[key];
                        const val = Math.min(100, Math.max(0, rawVal)); // Strict clamp for visual
                        const meta = STATS.find(s => s.id === key);
                        
                        const start = -Math.PI/2 + (i * maxAngle);
                        const fillAngle = (val / 100) * maxAngle;
                        
                        // Track
                        ctx.beginPath();
                        ctx.arc(n.x, n.y, r, start, start + maxAngle);
                        ctx.strokeStyle = 'rgba(0, 255, 255, 0.15)';
                        ctx.lineWidth = 6;
                        ctx.shadowColor = meta.color;
                        ctx.shadowBlur = 8;
                        ctx.stroke();
                        ctx.shadowBlur = 0;

                        // Fill
                        if(val > 0) {
                            ctx.beginPath();
                            ctx.arc(n.x, n.y, r, start, start + fillAngle);
                            ctx.strokeStyle = meta.color;
                            ctx.lineWidth = 6;
                            ctx.shadowColor = meta.color;
                            ctx.shadowBlur = 12;
                            ctx.stroke();
                            ctx.shadowBlur = 0;
                        }
                    });

                    // 3. Pop Text with glow
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 11px JetBrains Mono';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.shadowColor = 'rgba(0, 255, 255, 0.8)';
                    ctx.shadowBlur = 10;
                    const popTxt = (n.pop/1000).toFixed(0) + 'k';
                    ctx.fillText(popTxt, n.x, n.y);
                    ctx.shadowBlur = 0;
                });
            },

            drawPlacements() {
                if(!this.placements) return;
                const ctx = this.ctx;
                this.placements.forEach(p => {
                    const b = BUILDINGS.find(x => x.id === p.typeId);
                    
                    // Area of effect fill (no stroke) - subtle
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, b.range, 0, Math.PI*2);
                    ctx.fillStyle = b.color;
                    ctx.globalAlpha = 0.05; // Very subtle, especially with many buildings
                    ctx.shadowColor = b.color;
                    ctx.shadowBlur = 10;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.globalAlpha = 1;

                    if (b.id === 'factory' && !p.inactive) {
                        // Factory pollution area (no stroke) - subtle
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, 70, 0, Math.PI*2);
                        ctx.fillStyle = '#ff0066';
                        ctx.globalAlpha = 0.08; // Subtle pollution indicator
                        ctx.shadowColor = '#ff0066';
                        ctx.shadowBlur = 15;
                        ctx.fill();
                        ctx.shadowBlur = 0;
                        ctx.globalAlpha = 1;
                    }

                    // Draw connection lines to roads only (not hubs) - styled exactly like main roads
                    if(p.connected) {
                        // Background layer (same as main roads)
                        ctx.save();
                        ctx.strokeStyle = '#7c8ca0';
                        ctx.globalAlpha = 0.25;
                        ctx.lineWidth = 7;
                        ctx.lineCap = 'round';
                        ctx.lineJoin = 'round';
                        p.connections.forEach(c => {
                            if(c.type === 'line') {
                            ctx.beginPath();
                            ctx.moveTo(p.x, p.y);
                            ctx.lineTo(c.x, c.y);
                            ctx.stroke();
                            }
                        });
                        ctx.restore();
                        
                        // Foreground dashed line (same as main roads)
                        ctx.save();
                        ctx.strokeStyle = '#7c8ca0';
                        ctx.lineWidth = 3;
                        ctx.globalAlpha = 0.5;
                        ctx.setLineDash([10, 8]);
                        ctx.lineDashOffset = -this.animTime * 30;
                        ctx.lineCap = 'round';
                        ctx.lineJoin = 'round';
                        p.connections.forEach(c => {
                            if(c.type === 'line') {
                                ctx.beginPath();
                                ctx.moveTo(p.x, p.y);
                                ctx.lineTo(c.x, c.y);
                                ctx.stroke();
                            }
                        });
                        ctx.setLineDash([]);
                        ctx.globalAlpha = 1.0;
                        ctx.restore();
                    }
                });
                
                // === Animated dots on building connection lines (aux roads) ===
                const animationTime = performance.now() * 0.001;
                const dotSpeed = 50;
                const dotSpacing = 60;
                const dotSize = 3;
                
                ctx.save();
                ctx.fillStyle = '#a8b8d0';
                ctx.globalAlpha = 0.8;
                
                this.placements.forEach(p => {
                    if(!p.connected) return;
                    
                    p.connections.forEach(c => {
                        if(c.type !== 'line') return;
                        
                        // Build path from building to connection point
                        const pathPoints = [
                            {x: p.x, y: p.y},
                            {x: c.x, y: c.y}
                        ];
                        
                        // Calculate path length
                        const totalLength = Math.hypot(c.x - p.x, c.y - p.y);
                        if (totalLength === 0) return;
                        
                        // Draw multiple dots along the path
                        const numDots = Math.ceil(totalLength / dotSpacing) + 1;
                        for (let dotIdx = 0; dotIdx < numDots; dotIdx++) {
                            const basePosition = dotIdx * dotSpacing;
                            const animOffset = (animationTime * dotSpeed) % (totalLength + dotSpacing);
                            const position = (basePosition - animOffset + totalLength + dotSpacing) % (totalLength + dotSpacing);
                            
                            if (position < 0 || position > totalLength) continue;
                            
                            // Calculate position along line
                            const t = position / totalLength;
                            const dotX = p.x + (c.x - p.x) * t;
                            const dotY = p.y + (c.y - p.y) * t;
                            
                            // Draw the dot
                            ctx.beginPath();
                            ctx.arc(dotX, dotY, dotSize, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    });
                });
                
                ctx.restore();
                
                // Draw building icons
                this.placements.forEach(p => {
                    const b = BUILDINGS.find(x => x.id === p.typeId);
                    const size = b.size === 'large' ? 14 : 10;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, size + 4, 0, Math.PI*2);
                    ctx.fillStyle = '#111';
                    ctx.fill();
                    ctx.lineWidth = 4;
                    
                    // Inactive buildings (on obstacles) are grayed out
                    if(p.inactive) {
                        ctx.strokeStyle = '#666';
                        ctx.globalAlpha = 0.5;
                    } else {
                        ctx.strokeStyle = p.connected ? b.color : '#ff0066';
                    }
                    ctx.stroke();
                    ctx.globalAlpha = 1;

                    ctx.save();
                    ctx.translate(p.x, p.y);
                    const scale = (size * 1.5) / 24; 
                    ctx.scale(scale, scale);
                    ctx.translate(-12, -12); 
                    // Inactive buildings have grayed out icons
                    if(p.inactive) {
                        ctx.fillStyle = '#666';
                        ctx.globalAlpha = 0.5;
                    } else {
                    ctx.fillStyle = b.color;
                    }
                    ctx.fill(this.iconPaths[b.iconKey]);
                    ctx.globalAlpha = 1;
                    ctx.restore();
                });
            },

            drawDragPreview() {
                if(this.draggingId) {
                    const b = BUILDINGS.find(x => x.id === this.draggingId);
                    const ctx = this.ctx;
                    
                    // Check if position is on obstacle (will be inactive)
                    const obstacleType = this.checkObstacle(this.mouseX, this.mouseY);
                    const willBeInactive = obstacleType !== null;
                    const isValidCollision = !this.checkCollision(this.mouseX, this.mouseY);
                    
                    // Color: gray if on obstacle, red if collision, normal color if valid
                    let color;
                    if(willBeInactive) {
                        color = '#666'; // Gray for inactive
                    } else if(!isValidCollision) {
                        color = '#ff0066'; // Red for collision
                    } else {
                        color = b.color; // Normal color
                    }

                    // Show obstacle areas when hovering over them
                    if(this.map.obstacles && willBeInactive) {
                        ctx.save();
                        this.map.obstacles.forEach(obs => {
                            const dist = Math.hypot(obs.x - this.mouseX, obs.y - this.mouseY);
                            if(dist < obs.radius + 30) {
                                ctx.beginPath();
                                ctx.arc(obs.x, obs.y, obs.radius, 0, Math.PI * 2);
                                ctx.strokeStyle = '#ffaa00';
                                ctx.lineWidth = 4;
                                ctx.globalAlpha = 0.8;
                                ctx.setLineDash([5, 5]);
                                ctx.stroke();
                                ctx.setLineDash([]);
                            }
                        });
                        ctx.globalAlpha = 1;
                        ctx.restore();
                    }

                    // Area of effect fill (no stroke) - subtle preview (skip if inactive)
                    if(!willBeInactive) {
                    ctx.beginPath();
                    ctx.arc(this.mouseX, this.mouseY, b.range, 0, Math.PI*2);
                    ctx.fillStyle = color;
                        ctx.globalAlpha = 0.12; // Subtle preview
                    ctx.fill();
                    ctx.globalAlpha = 1;

                    if (b.id === 'factory') {
                            // Factory pollution area (no stroke) - subtle
                        ctx.beginPath();
                        ctx.arc(this.mouseX, this.mouseY, 70, 0, Math.PI*2);
                            ctx.fillStyle = '#ff0066';
                            ctx.globalAlpha = 0.1; // Subtle pollution preview
                        ctx.fill();
                        ctx.globalAlpha = 1;
                        }
                    }

                    // Building base - always visible, even over obstacles
                    const size = b.size === 'large' ? 14 : 10;
                    ctx.beginPath();
                    ctx.arc(this.mouseX, this.mouseY, size + 4, 0, Math.PI*2);
                    ctx.fillStyle = '#111';
                    ctx.fill();
                    ctx.lineWidth = 4;
                    ctx.strokeStyle = color;
                    if(willBeInactive) {
                        ctx.globalAlpha = 0.5; // Grayed out for inactive
                    }
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                    
                    // Building icon - always visible
                    ctx.save();
                    ctx.translate(this.mouseX, this.mouseY);
                    const scale = (size * 1.5) / 24; 
                    ctx.scale(scale, scale);
                    ctx.translate(-12, -12); 
                    ctx.fillStyle = color;
                    if(willBeInactive) {
                        ctx.globalAlpha = 0.5; // Grayed out for inactive
                    }
                    if(this.iconPaths[b.iconKey]) {
                        ctx.fill(this.iconPaths[b.iconKey]);
                    }
                    ctx.globalAlpha = 1;
                    ctx.restore();
                    
                    // Show connection lines to roads only (not hubs) - styled like main roads
                    // Skip connection lines if on obstacle (will be inactive)
                    const conns = willBeInactive ? [] : this.getConnectivity(this.mouseX, this.mouseY);
                    if(conns.length > 0 && isValidCollision) {
                        // Background layer (same as main roads)
                        ctx.save();
                        ctx.strokeStyle = '#7c8ca0';
                        ctx.globalAlpha = 0.25;
                        ctx.lineWidth = 7;
                        ctx.lineCap = 'round';
                        ctx.lineJoin = 'round';
                        conns.forEach(c => {
                            if(c.type === 'line') {
                                ctx.beginPath();
                                ctx.moveTo(this.mouseX, this.mouseY);
                                ctx.lineTo(c.x, c.y);
                                ctx.stroke();
                            }
                        });
                        ctx.restore();
                        
                        // Foreground dashed line (same as main roads)
                        ctx.save();
                        ctx.strokeStyle = '#7c8ca0';
                        ctx.lineWidth = 3;
                        ctx.globalAlpha = 0.5;
                        ctx.setLineDash([10, 8]);
                        ctx.lineDashOffset = -this.animTime * 30;
                        ctx.lineCap = 'round';
                        ctx.lineJoin = 'round';
                        conns.forEach(c => {
                            if(c.type === 'line') {
                                ctx.beginPath();
                                ctx.moveTo(this.mouseX, this.mouseY);
                                ctx.lineTo(c.x, c.y);
                                ctx.stroke();
                            }
                        });
                        ctx.setLineDash([]);
                        ctx.globalAlpha = 1.0;
                        ctx.restore();
                    }
                }
            }
        };

        window.onload = () => gameApp.init();

    </script>
</body>
